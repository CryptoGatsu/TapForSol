<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TapForSol</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

body{
background: radial-gradient(circle at center,#0b1220,#020617);
color:white;
font-family: Inter, Arial;
text-align:center;
padding-top:70px;
}

.container{
width:420px;
margin:auto;
background:#111827;
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(99,102,241,.35);
}

.logo{
width:240px;
margin-bottom:10px;
}

.subtitle{
color:#cbd5e1;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:15px;
margin-bottom:15px;
outline:none;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22d3ee,#a855f7);
color:white;
transition:.25s;
}

button:hover{
transform:scale(1.04);
box-shadow:0 0 25px #8b5cf6;
}

#status{
margin-top:18px;
color:#e2e8f0;
word-break:break-word;
}

.feed{
margin-top:25px;
background:#020617;
padding:15px;
border-radius:12px;
height:180px;
overflow-y:auto;
font-size:14px;
text-align:left;
}

.feed-title{
margin-top:25px;
margin-bottom:8px;
color:#94a3b8;
font-size:14px;
}

.claim{
color:#4ade80;
margin-bottom:6px;
}

</style>
</head>
<meta charset="UTF-8">
<title>TapForSol</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="/">

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="subtitle">Claim free SOL from real trading rewards</div>

<input id="wallet" placeholder="Enter Solana wallet address">

<div class="cf-turnstile" data-sitekey="0x4AAAAAACkDEgQxsQv369rM"></div>

<button onclick="claim()">Claim SOL</button>

<div id="status"></div>

<div class="feed-title">Live Claims</div>
<div id="feed" class="feed"></div>

</div>

<script>

async function getFingerprint(){
const data=[
navigator.userAgent,
navigator.language,
screen.width,
screen.height,
new Date().getTimezoneOffset()
].join("|");

const hashBuffer=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(data));
return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function updateFeed(){
try{
const res=await fetch("https://tapforsol-production.up.railway.app/feed");
const claims=await res.json();

const feed=document.getElementById("feed");
feed.innerHTML="";

claims.forEach(c=>{
const div=document.createElement("div");
div.className="claim";
div.innerText=c.wallet.slice(0,4)+"..."+c.wallet.slice(-4)+" claimed "+(c.amount/1e9).toFixed(3)+" SOL";
feed.appendChild(div);
});
}catch{}
}

setInterval(updateFeed,5000);
updateFeed();

async function claim(){

const wallet=document.getElementById("wallet").value;
const status=document.getElementById("status");

if(!wallet){
status.innerText="Enter wallet address";
return;
}

status.innerText="Preparing session...";

let challengeToken;

try{
const challengeRes=await fetch("https://tapforsol-production.up.railway.app/challenge");
const challengeData=await challengeRes.json();
challengeToken=challengeData.token;
}catch{
status.innerText="Server unreachable.";
return;
}

const fingerprint=await getFingerprint();

const captchaToken=document.querySelector('[name="cf-turnstile-response"]').value;

if(!captchaToken){
status.innerText="Complete captcha first";
return;
}

status.innerText="Processing claim...";

const res=await fetch("https://tapforsol-production.up.railway.app/claim",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
wallet,
token:captchaToken,
challengeToken,
fingerprint
})
});

const data=await res.json();

if(data.tx){
status.innerHTML="Success!<br><a target='_blank' href='"+data.explorer+"'>View Transaction</a>";
updateFeed();
}else{
status.innerText=data.error||"Claim failed";
}
}

</script>

</body>
</html>
