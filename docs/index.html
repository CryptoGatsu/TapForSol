<!DOCTYPE html>
<html>
<head>
  <title>TapForSol Faucet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      background: #0f172a;
      color: white;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #status {
      margin-top: 20px;
      word-break: break-word;
    }
  </style>
</head>

<body>

<h1>🚰 TapForSol</h1>
<p>Claim free devnet SOL</p>

<div class="box">

  <input id="wallet" placeholder="Enter Solana wallet address" />

  <div
    class="cf-turnstile"
    data-sitekey="0x4AAAAAACkDEgQxsQv369rM">
  </div>

  <button onclick="claim()">Claim</button>

  <div id="status"></div>

</div>

<script>
async function claim() {

  const wallet = document.getElementById("wallet").value;
  const status = document.getElementById("status");

  const token = document.querySelector('[name="cf-turnstile-response"]').value;

  if (!wallet) {
    status.innerText = "Enter wallet address";
    return;
  }

  if (!token) {
    status.innerText = "Complete captcha first";
    return;
  }

  status.innerText = "Processing claim...";

  try {
    const res = await fetch("https://tapforsol-production.up.railway.app/claim", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        wallet: wallet,
        token: token
      })
    });

    const data = await res.json();

    if (data.tx) {
      status.innerHTML =
        "Success!<br><a target='_blank' href='" +
        data.explorer +
        "'>View Transaction</a>";
    } else {
      status.innerText = data.error;
    }

  } catch (err) {
    status.innerText = "Server error";
  }
}
</script>

</body>
</html>
