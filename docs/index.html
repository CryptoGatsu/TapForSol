<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapForSol</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0b1022,#020617 70%);
  font-family: Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  width:420px;
  max-width:92%;
  background:rgba(30,41,59,.75);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:30px;
  text-align:center;
}
.logo{width:240px;margin-bottom:10px;}
input{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:#020617;color:white;margin-bottom:15px;
}
button{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(90deg,#22d3ee,#a855f7);
  color:white;font-weight:bold;cursor:pointer;
}
#status{margin-top:15px;}
.feed{
position:fixed;
right:20px;
bottom:20px;
width:260px;
font-size:13px;
}
.feed div{
background:rgba(15,23,42,.9);
padding:10px;
margin-top:8px;
border-radius:10px;
box-shadow:0 0 12px rgba(34,211,238,.3);
}
</style>
</head>

<body>

<div class="card">

<img src="./tapforsol-logo.png" class="logo">

<p>Claim free SOL from real trading rewards</p>

<input id="wallet" placeholder="Enter Solana wallet address">

<div class="cf-turnstile" data-sitekey="0x4AAAAAACkDEgQxsQv369rM"></div>

<button onclick="claim()">Claim SOL</button>

<div id="status"></div>

</div>

<div id="feed" class="feed"></div>

<script>

const socket = io("https://tapforsol-production.up.railway.app");

socket.on("new-claim", data => {
  const short=data.wallet.slice(0,4)+"..."+data.wallet.slice(-4);
  const div=document.createElement("div");
  div.innerHTML=`💧 ${data.amount.toFixed(3)} SOL claimed by ${short}`;
  const feed=document.getElementById("feed");
  feed.prepend(div);
  if(feed.children.length>6) feed.removeChild(feed.lastChild);
});

async function claim(){

  const wallet=document.getElementById("wallet").value;
  const status=document.getElementById("status");

  status.innerText="Preparing session...";

  const challenge=await fetch("https://tapforsol-production.up.railway.app/challenge");
  const challengeData=await challenge.json();

  const captcha=document.querySelector('[name="cf-turnstile-response"]').value;

  const res=await fetch("https://tapforsol-production.up.railway.app/claim",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      wallet,
      token:captcha,
      challengeToken:challengeData.token,
      fingerprint:"browser"
    })
  });

  const data=await res.json();

  if(data.tx){
    status.innerHTML=`Success! <a target="_blank" href="${data.explorer}">View Transaction</a>`;
  }else{
    status.innerText=data.error;
  }
}
</script>

</body>
</html>
